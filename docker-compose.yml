# ==================================================================
# Docker Compose — Hotel Booking Application
# Services: Backend, Frontend, MongoDB, MySQL, Redis
# Networks: hotel-net (custom bridge)
# Volumes: mongo-data, mysql-data (persistent storage)
# ==================================================================

version: '3.8'

services:
  # ============================================
  # MongoDB — Primary NoSQL Database
  # ============================================
  mongodb:
    image: mongo:7.0
    container_name: hotel-mongodb
    restart: unless-stopped
    ports:
      - "${MONGODB_HOST_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-adminpass}
      MONGO_INITDB_DATABASE: hotel-booking
    volumes:
      - mongo-data:/data/db
      - mongo-config:/data/configdb
    networks:
      - hotel-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet -u $$MONGO_INITDB_ROOT_USERNAME -p $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\" | grep 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ============================================
  # MySQL — Relational Database (Sequelize)
  # ============================================
  mysql:
    image: mysql:8.0
    container_name: hotel-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-Sigmora_db}
      MYSQL_USER: ${MYSQL_USER:-hotel_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-hotel_password}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - hotel-net
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ============================================
  # Redis — Distributed room-booking lock store
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: hotel-redis
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - hotel-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ============================================
  # Backend — Node.js/Express API
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hotel-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_HOST_PORT:-5000}:5000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-adminpass}@mongodb:27017/hotel-booking?authSource=admin
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-hotel_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-hotel_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-Sigmora_db}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-hotel_booking_access_secret_dev_key_2024}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-hotel_booking_refresh_secret_dev_key_2024}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      SQL_SCHEMA_SYNC: ${SQL_SCHEMA_SYNC:-true}
      SQL_SCHEMA_ALTER: ${SQL_SCHEMA_ALTER:-true}
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
      REDIS_URL: redis://redis:6379
      REDIS_LOCK_TTL_MS: ${REDIS_LOCK_TTL_MS:-15000}
      REDIS_LOCK_WAIT_MS: ${REDIS_LOCK_WAIT_MS:-5000}
      REDIS_LOCK_RETRY_MS: ${REDIS_LOCK_RETRY_MS:-120}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-demo}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-demo}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-demo}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-rzp_test_demo}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-demo}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-demo}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_SECURE: ${EMAIL_SECURE:-false}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      EMAIL_REQUIRE_TLS: ${EMAIL_REQUIRE_TLS:-false}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@hotelbooking.com}
    depends_on:
      mongodb:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hotel-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ============================================
  # Frontend — React/Vite served by Nginx
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost/api/v1}
        VITE_RAZORPAY_KEY_ID: ${VITE_RAZORPAY_KEY_ID:-rzp_test_demo}
        VITE_GOOGLE_MAPS_KEY: ${VITE_GOOGLE_MAPS_KEY:-demo}
    container_name: hotel-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_HOST_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - hotel-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

# ============================================
# Named Volumes — Persistent Data Storage
# ============================================
volumes:
  mongo-data:
    driver: local
    name: hotel-mongo-data
  mongo-config:
    driver: local
    name: hotel-mongo-config
  mysql-data:
    driver: local
    name: hotel-mysql-data
  redis-data:
    driver: local
    name: hotel-redis-data

# ============================================
# Networks — Custom Bridge Network
# ============================================
networks:
  hotel-net:
    driver: bridge
    name: hotel-booking-network
    ipam:
      config:
        - subnet: 172.28.0.0/16
