# ==================================================================
# CI Pipeline — Hotel Booking Platform
# Triggers: Push/PR to main, develop
# Steps: Lint → Build → Unit Tests → Integration Tests → Security → UI Tests
# ==================================================================
name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  # ============================================
  # Job 1: Lint
  # ============================================
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: ./backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Lint backend
        run: npm run lint --if-present
        working-directory: ./backend
        continue-on-error: true

      - name: Lint frontend
        run: npm run lint --if-present
        working-directory: ./frontend
        continue-on-error: true

  # ============================================
  # Job 2: Build Frontend
  # ============================================
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Build
        run: npm run build
        working-directory: ./frontend
        env:
          VITE_API_URL: http://localhost:5000/api/v1

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ============================================
  # Job 3: Unit Tests (Backend)
  # ============================================
  unit-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./backend

      - name: Run unit tests
        run: npm run test:unit
        working-directory: ./backend
        env:
          NODE_ENV: test
          JWT_ACCESS_SECRET: ci_test_access_secret
          JWT_REFRESH_SECRET: ci_test_refresh_secret

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: backend/coverage
          retention-days: 7

  # ============================================
  # Job 4: Integration Tests (Backend + MongoDB)
  # ============================================
  integration-tests:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./backend

      - name: Run integration tests
        run: npm run test:integration
        working-directory: ./backend
        env:
          NODE_ENV: test
          JWT_ACCESS_SECRET: ci_test_access_secret
          JWT_REFRESH_SECRET: ci_test_refresh_secret

  # ============================================
  # Job 5: Security Tests
  # ============================================
  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./backend

      - name: Run OWASP security tests
        run: npm run test:security
        working-directory: ./backend
        env:
          NODE_ENV: test
          JWT_ACCESS_SECRET: ci_test_access_secret
          JWT_REFRESH_SECRET: ci_test_refresh_secret

      - name: npm audit (security scan)
        run: npm audit --audit-level=high --omit=dev || true
        working-directory: ./backend

      - name: Frontend npm audit
        run: npm audit --audit-level=high --omit=dev || true
        working-directory: ./frontend

  # ============================================
  # Job 6: UI Tests (Playwright)
  # ============================================
  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            e2e/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Install e2e dependencies
        run: npm ci
        working-directory: ./e2e

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: ./e2e

      - name: Run capstone UI flow
        run: npm run test:capstone
        working-directory: ./e2e
        env:
          VITE_API_URL: http://localhost:5000/api/v1

  # ============================================
  # Job 7: Full Coverage Report
  # ============================================
  coverage:
    name: Test Coverage Report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, security-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./backend

      - name: Run full test suite with coverage
        run: npm run test:coverage
        working-directory: ./backend
        env:
          NODE_ENV: test
          JWT_ACCESS_SECRET: ci_test_access_secret
          JWT_REFRESH_SECRET: ci_test_refresh_secret

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage
          retention-days: 30
