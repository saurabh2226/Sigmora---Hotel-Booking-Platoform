# ==================================================================
# E2E Pipeline — Playwright Tests
# Runs after CD on staging or manually
# ==================================================================
name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL to test against'
        required: false
        default: 'http://127.0.0.1:4173'
  workflow_run:
    workflows: ["CD Pipeline"]
    types: [completed]
    branches: [main]

jobs:
  playwright-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Install E2E dependencies
        run: npm ci
        working-directory: ./e2e

      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        working-directory: ./e2e

      - name: Run Playwright tests
        run: npx playwright test
        working-directory: ./e2e
        env:
          BASE_URL: ${{ github.event.inputs.base_url || 'http://127.0.0.1:4173' }}
          VITE_API_URL: http://127.0.0.1:5000/api/v1

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 30

      - name: Upload test screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-screenshots
          path: e2e/test-results/
          retention-days: 7
